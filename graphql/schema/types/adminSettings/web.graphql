input RateLimitConfigInput {
  restHumanRequestsPerHour: Int!
  restHumanBurst: Int!
  restServiceRequestsPerHour: Int!
  restServiceBurst: Int!
  graphqlHumanRequestsPerHour: Int!
  graphqlHumanBurst: Int!
  graphqlServiceRequestsPerHour: Int!
  graphqlServiceBurst: Int!
  graphqlComplexityLimit: Int!
  elevatedUserIds: [String!]!
}

type RateLimitConfig {
  restHumanRequestsPerHour: Int
  restHumanBurst: Int
  restServiceRequestsPerHour: Int
  restServiceBurst: Int
  graphqlHumanRequestsPerHour: Int
  graphqlHumanBurst: Int
  graphqlServiceRequestsPerHour: Int
  graphqlServiceBurst: Int
  graphqlComplexityLimit: Int
  elevatedUserIds: [String!]
}

input APIConfigInput {
  httpListenAddr: String!
  url: String!
  corpUrl: String!
  rateLimit: RateLimitConfigInput
}

type APIConfig {
  httpListenAddr: String
  url: String
  corpUrl: String
  rateLimit: RateLimitConfig
}

input UIConfigInput {
  url: String!
  uiv2Url: String!
  parsleyUrl: String!
  httpListenAddr: String!
  secret: String! @redactSecrets
  defaultProject: String!
  corsOrigins: [String!]!
  fileStreamingContentTypes: [String!]!
  loginDomain: String!
  userVoice: String!
  csrfKey: String! @redactSecrets
  cacheTemplates: Boolean!
  stagingEnvironment: String!
  betaFeatures: BetaFeaturesInput!
}

type UIConfig {
  betaFeatures: BetaFeatures!
  url: String
  uiv2Url: String
  parsleyUrl: String
  httpListenAddr: String
  secret: String @requireAdmin
  defaultProject: String!
  corsOrigins: [String!]!
  fileStreamingContentTypes: [String!]!
  loginDomain: String
  userVoice: String
  csrfKey: String @requireAdmin
  cacheTemplates: Boolean
  stagingEnvironment: String
}
