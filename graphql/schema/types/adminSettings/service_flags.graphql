# ServiceFlag represents a single service flag as a name/enabled pair for dynamic discovery.
type ServiceFlag {
  name: String!
  enabled: Boolean!
}

# ServiceFlagInput is the input type for toggling a single service flag by name.
input ServiceFlagInput {
  name: String!
  enabled: Boolean!
}

# UserServiceFlags are service flags that users have permission to view.
type UserServiceFlags {
  debugSpawnHostDisabled: Boolean
  jwtTokenForCLIDisabled: Boolean
  staticAPIKeysDisabled: Boolean
}
