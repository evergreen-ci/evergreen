type OktaServiceConfig {
  audience: String
  clientId: String @requireAdmin
  clientSecret: String @requireAdmin
  headerName: String
  issuer: String
  keysetURL: String
  scopes: [String!]
}

input OktaServiceConfigInput {
  audience: String
  clientId: String @redactSecrets
  clientSecret: String @redactSecrets
  headerName: String
  issuer: String
  keysetURL: String
  scopes: [String!]
}
