mutation {
  saveProjectSettingsForSection(
    projectSettings: {
      projectId: "sandbox_project_id"
      projectRef: { id: "sandbox_project_id" }
      vars: {
        vars: { goodbye: "now" }
        privateVarsList: ["goodbye"]
        varsDescriptions: { goodbye: "goodbye description" }
      }
    }
    section: VARIABLES
  ) {
    vars {
      vars
      privateVars
      varsDescriptions
    }
  }
}
