mutation {
  saveProjectSettingsForSection(
    projectSettings: {
      projectId: "sandbox_project_id"
      projectRef: {
        id: "sandbox_project_id"
        githubChecksEnabled: true
      }
    }
    section: COMMIT_CHECKS
  ) {
    projectRef {
      githubChecksEnabled ## changed
    }
    vars {
      vars ## should be unchanged
    }
  }
}
