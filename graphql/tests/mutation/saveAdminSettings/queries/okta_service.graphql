mutation {
  saveAdminSettings(
    adminSettings: {
      oktaServiceConfig: {
        audience: "audience"
        clientId: "service-id"
        clientSecret: "service-secret"
        headerName: "okta-auth-header"
        issuer: "issuer"
        keysetURL: "https://example.com/keys"
        scopes: ["scope1", "scope2"]
      }
    }
  ) {
    oktaServiceConfig {
      audience
      clientId
      headerName
      issuer
      keysetURL
      scopes
    }
  }
}
