mutation {
  saveAdminSettings(
    adminSettings: {
      oktaServiceConfig: {
        audience: "audience"
        clientId: "service-id"
        clientSecret: "service-secret"
        scopes: ["scope1", "scope2"]
      }
    }
  ) {
    oktaServiceConfig {
      audience
      clientId
      scopes
    }
  }
}
