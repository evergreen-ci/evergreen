mutation {
  saveAdminSettings(
    adminSettings: {
      api: {
        httpListenAddr: ":9090"
        url: "http://localhost:8080"
        corpUrl: "https://evergreen-staging.corp.mongodb.com"
        rateLimit: {
          restHumanRequestsPerHour: 100
          restHumanBurst: 10
          restServiceRequestsPerHour: 200
          restServiceBurst: 20
          graphqlHumanRequestsPerHour: 300
          graphqlHumanBurst: 30
          graphqlServiceRequestsPerHour: 400
          graphqlServiceBurst: 40
          graphqlComplexityLimit: 1000
          elevatedUserIds: ["user1", "user2"]
        }
      }
      disabledGQLQueries: ["query1", "query2", "query3", "query4"]
      ui: {
        url: "http://localhost:600"
        uiv2Url: "http://localhost:3000"
        parsleyUrl: "http://localhost:4173"
        httpListenAddr: ":3000"
        secret: "test-secret"
        defaultProject: "evergreen"
        corsOrigins: ["http://localhost:3000", "http://localhost:5173"]
        fileStreamingContentTypes: ["text/plain", "application/json"]
        loginDomain: "localhost"
        userVoice: "https://uservoice.com"
        csrfKey: "12345678901234567890123456789012"
        cacheTemplates: true
        stagingEnvironment: "not-staging"
        betaFeatures: { spruceWaterfallEnabled: false }
      }
    }
  ) {
    api {
      httpListenAddr
      url
      corpUrl
      rateLimit {
        restHumanRequestsPerHour
        restHumanBurst
        restServiceRequestsPerHour
        restServiceBurst
        graphqlHumanRequestsPerHour
        graphqlHumanBurst
        graphqlServiceRequestsPerHour
        graphqlServiceBurst
        graphqlComplexityLimit
        elevatedUserIds
      }
    }
    ui {
      url
      uiv2Url
      parsleyUrl
      httpListenAddr
      secret
      defaultProject
      corsOrigins
      fileStreamingContentTypes
      loginDomain
      userVoice
      csrfKey
      cacheTemplates
      stagingEnvironment
      betaFeatures {
        spruceWaterfallEnabled
      }
    }
    disabledGQLQueries
  }
}
