## Regression test: when repoId and projectRef.id diverge, the resolver
## must force the write to the authorized repoId. The response's projectRef.id
## should reflect the authorized repo, proving the override took effect.
mutation {
  saveRepoSettingsForSection(
    repoSettings: {
      repoId: "sandbox_repo_id"
      projectRef: { id: "another_repo_id" }
      vars: { vars: { mismatch_test: "value" } }
    }
    section: VARIABLES
  ) {
    projectRef {
      id
    }
    vars {
      vars
    }
  }
}
