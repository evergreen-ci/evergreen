mutation {
  saveRepoSettingsForSection(
    repoSettings: {
      repoId: "sandbox_repo_id"
      projectRef: {
        id: "sandbox_repo_id"
        owner: "hello"
        repo: "world"
        enabled: true
        remotePath: "my_path_is_new"
        runEveryMainlineCommit: true
      }
    }
    section: GENERAL
  ) {
    projectRef {
      enabled
      remotePath
      spawnHostScriptPath ## overwritten
      runEveryMainlineCommit
    }
    vars {
      ## should be unchanged
      vars
      privateVars
    }
  }
}
