mutation {
  saveRepoSettingsForSection(
    repoSettings: {
      repoId: "sandbox_repo_id"
      projectRef: {
        id: "sandbox_repo_id"
        githubChecksEnabled: true
      }
      aliases: [
        {
          id: "checks-alias-id-1"
          alias: "__github_checks"  # evergreen.GithubChecksAlias
          gitTag: ""
          remotePath: ""
          task: "unit_tests"
          variant: "ubuntu1604"
          taskTags: []
          variantTags: []
        }
      ]
    }
    section: COMMIT_CHECKS
  ) {
    projectRef {
      githubChecksEnabled ## changed
    }
    vars {
      vars ## should be unchanged
      privateVars
    }
  }
}
