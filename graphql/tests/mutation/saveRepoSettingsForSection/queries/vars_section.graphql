mutation {
  saveRepoSettingsForSection(
    repoSettings: {
      repoId: "sandbox_repo_id"
      projectRef: { id: "sandbox_repo_id" }
      vars: {
        vars: { goodbye: "now" }
        privateVarsList: ["goodbye"]
        varsDescriptions: { goodbye: "goodbye description" }
      }
    }
    section: VARIABLES
  ) {
    vars {
      vars
      privateVars
      varsDescriptions
    }
  }
}
