query {
  repoEvents(repoId: "sandbox_repo_id") {
    eventLogEntries {
      user
      timestamp
      before {
        projectRef {
          branch
        }
        githubWebhooksEnabled
        vars {
          vars
          varsDescriptions
        }
      }
      after {
        projectRef {
          branch
        }
        # todo in EVG-16608: investigate why this field returns the wrong data
        githubWebhooksEnabled
        vars {
          vars
          varsDescriptions
        }
      }
    }
    count
  }
}
