query Web {
  adminSettings {
    api {
      httpListenAddr
      url
      corpUrl
    }

    rateLimit {
      restUserPerHour
      restUserBurst
      restServicePerHour
      restServiceBurst
      graphqlUserPerHour
      graphqlUserBurst
      graphqlServicePerHour
      graphqlServiceBurst
      graphqlComplexityLimit
      elevatedUserIds
    }

    ui {
      url
      uiv2Url
      parsleyUrl
      httpListenAddr
      secret
      defaultProject
      corsOrigins
      fileStreamingContentTypes
      loginDomain
      userVoice
      csrfKey
      cacheTemplates
      stagingEnvironment
      betaFeatures {
        spruceWaterfallEnabled
      }
    }
    disabledGQLQueries
  }
}
