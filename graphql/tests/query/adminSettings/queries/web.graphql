query Web {
  adminSettings {
    api {
      httpListenAddr
      url
      corpUrl
    }

    rateLimit {
      elevatedUserIds
      graphqlComplexityLimit
      graphqlServiceBurst
      graphqlServicePerHour
      graphqlUserBurst
      graphqlUserPerHour
      restServiceBurst
      restServicePerHour
      restUserBurst
      restUserPerHour
    }

    ui {
      url
      uiv2Url
      parsleyUrl
      httpListenAddr
      secret
      defaultProject
      corsOrigins
      fileStreamingContentTypes
      loginDomain
      userVoice
      csrfKey
      cacheTemplates
      stagingEnvironment
      betaFeatures {
        spruceWaterfallEnabled
      }
    }
    disabledGQLQueries
  }
}
