query Web {
  adminSettings {
    api {
      httpListenAddr
      url
      corpUrl
    }

    rateLimit {
      restHumanRequestsPerHour
      restHumanBurst
      restServiceRequestsPerHour
      restServiceBurst
      graphqlHumanRequestsPerHour
      graphqlHumanBurst
      graphqlServiceRequestsPerHour
      graphqlServiceBurst
      graphqlComplexityLimit
      elevatedUserIds
    }

    ui {
      url
      uiv2Url
      parsleyUrl
      httpListenAddr
      secret
      defaultProject
      corsOrigins
      fileStreamingContentTypes
      loginDomain
      userVoice
      csrfKey
      cacheTemplates
      stagingEnvironment
      betaFeatures {
        spruceWaterfallEnabled
      }
    }
    disabledGQLQueries
  }
}
