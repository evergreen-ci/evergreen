on:
  workflow_call:

jobs:
  fetch-secrets:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: AWS OIDC – scoped to the calling repo
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::538830382384:role/evergreen-self-tests
          inline-session-policy: >-
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": ["secretsmanager:GetSecretValue","secretsmanager:DescribeSecret"],
                  "Resource": "arn:aws:secretsmanager:*:538830382384:secret:${{ github.repository }}/*"
                },
                {
                  "Effect": "Allow",
                  "Action": "secretsmanager:ListSecrets",
                  "Resource": "*"
                }
              ]
            }

      - name: Read secret(s)
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DB_PASSWORD,<ORG>/${{ github.repository }}/<ENV>/DB_PASSWORD
