on:
  workflow_call:

jobs:
  fetch-secrets:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: AWS OIDC – scoped to the calling repo
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/gha-secrets-read-<ENV>
          # Inline session policy narrows permissions to this repo/env path:

      - name: Read secret(s)
        run: |
          # Example: batch get or individual gets
          aws secretsmanager get-secret-value \
            --secret-id "<ORG>/${{ github.repository }}/<ENV>/DB_PASSWORD" \
            --query SecretString --output text | \
            sed 's/^/::add-mask::/' | tee /dev/stderr > /tmp/dbpw
          echo "DB_PASSWORD=$(cat /tmp/dbpw)" >> $GITHUB_ENV
