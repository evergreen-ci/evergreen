name: Self-Tests (GitHub Actions Migration)

# This is a PARALLEL migration - does NOT replace Evergreen self-tests.yml
# Both systems will run simultaneously during the migration period.
# See docs/github-actions-migration.md for full migration plan.

on:
  push:
    branches: [ main, migrate-to-github-actions ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # PHASE 1B: PROOF OF CONCEPT (2 tests)
  # ============================================================================

  test-util:
    name: test-util
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Project
        uses: ./.github/actions/setup-go-project
        with:
          go-version: '1.24'

      - name: Setup Credentials
        uses: ./.github/actions/setup-credentials
        # Using dummy default values from action (no secrets needed for now)

      - name: Run Test
        uses: ./.github/actions/run-test
        with:
          test_name: test-util

  test-db:
    name: test-db
    runs-on: ubuntu-22.04
