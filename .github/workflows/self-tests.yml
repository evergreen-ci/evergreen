name: Self-Tests (GitHub Actions Migration)

# This is a PARALLEL migration - does NOT replace Evergreen self-tests.yml
# Both systems will run simultaneously during the migration period.
# See docs/github-actions-migration.md for full migration plan.

on:
  push:
    branches: [ main, migrate-to-github-actions ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # PHASE 1B: PROOF OF CONCEPT (2 tests)
  # ============================================================================

  test-util:
    name: test-util
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Project
        uses: ./.github/actions/setup-go-project
        with:
          go-version: '1.24'

      - name: Setup Credentials
        uses: ./.github/actions/setup-credentials
        with:
          github_app_id: ${{ secrets.STAGING_GITHUB_APP_ID }}
          github_app_key: ${{ secrets.STAGING_GITHUB_APP_KEY }}
          jira_server: ${{ secrets.JIRA_SERVER }}
          jira_token: ${{ secrets.JIRA_PERSONAL_ACCESS_TOKEN }}
          crowd_server: ${{ secrets.CROWD_SERVER }}
          papertrail_key_id: ${{ secrets.PAPERTRAIL_KEY_ID }}
          papertrail_secret_key: ${{ secrets.PAPERTRAIL_SECRET_KEY }}
          runtime_env_base_url: ${{ secrets.RUNTIME_ENVIRONMENTS_BASE_URL }}
          runtime_env_api_key: ${{ secrets.RUNTIME_ENVIRONMENTS_API_KEY }}
          # AWS credentials would go here - using secrets or OIDC

      - name: Run Test
        uses: ./.github/actions/run-test
        with:
          test_name: test-util

  test-db:
    name: test-db
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go Project
