      - name: Setup Credentials
        uses: ./.github/actions/setup-credentials
        with:
          github_app_id: ${{ secrets.STAGING_GITHUB_APP_ID }}
          github_app_key: ${{ secrets.STAGING_GITHUB_APP_KEY }}
          jira_server: ${{ secrets.JIRA_SERVER }}
          jira_token: ${{ secrets.JIRA_PERSONAL_ACCESS_TOKEN }}
          crowd_server: ${{ secrets.CROWD_SERVER }}
          papertrail_key_id: ${{ secrets.PAPERTRAIL_KEY_ID }}
          papertrail_secret_key: ${{ secrets.PAPERTRAIL_SECRET_KEY }}
          runtime_env_base_url: ${{ secrets.RUNTIME_ENVIRONMENTS_BASE_URL }}
          runtime_env_api_key: ${{ secrets.RUNTIME_ENVIRONMENTS_API_KEY }}
          # AWS credentials would go here - using secrets or OIDC

      - name: Setup MongoDB
        uses: ./.github/actions/setup-mongodb

      - name: Run Test
        uses: ./.github/actions/run-test
        with:
          test_name: test-db

